name: Docker CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  #schedule:
  #  - cron: '15 20 * * 2'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract Antigravity CLI version and metadata
        id: agy-metadata
        run: |
          DOWNLOAD_BASE_URL=$(curl -fsSL "https://antigravity.google/cli/install.sh" | grep 'DOWNLOAD_BASE_URL=' | cut -d'"' -f2)

          MANIFEST_AMD64=$(curl -fsSL "${DOWNLOAD_BASE_URL}/manifests/linux_amd64.json")
          VERSION=$(echo "$MANIFEST_AMD64" | sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
          URL_AMD64=$(echo "$MANIFEST_AMD64" | sed -n 's/.*"url"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
          SHA512_AMD64=$(echo "$MANIFEST_AMD64" | sed -n 's/.*"sha512"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')

          MANIFEST_ARM64=$(curl -fsSL "${DOWNLOAD_BASE_URL}/manifests/linux_arm64.json")
          URL_ARM64=$(echo "$MANIFEST_ARM64" | sed -n 's/.*"url"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
          SHA512_ARM64=$(echo "$MANIFEST_ARM64" | sed -n 's/.*"sha512"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')

          if [ -z "$VERSION" ] || [ -z "$URL_AMD64" ] || [ -z "$SHA512_AMD64" ] || [ -z "$URL_ARM64" ] || [ -z "$SHA512_ARM64" ]; then
            echo "Error: Failed to extract all required metadata from manifests"
            exit 1
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "url_amd64=${URL_AMD64}" >> $GITHUB_OUTPUT
          echo "sha512_amd64=${SHA512_AMD64}" >> $GITHUB_OUTPUT
          echo "url_arm64=${URL_ARM64}" >> $GITHUB_OUTPUT
          echo "sha512_arm64=${SHA512_ARM64}" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=${{ steps.agy-metadata.outputs.version }},enable=${{ github.ref == 'refs/heads/master' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./docker
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CLI_VERSION=${{ steps.agy-metadata.outputs.version }}
            CLI_URL_AMD64=${{ steps.agy-metadata.outputs.url_amd64 }}
            CLI_SHA512_AMD64=${{ steps.agy-metadata.outputs.sha512_amd64 }}
            CLI_URL_ARM64=${{ steps.agy-metadata.outputs.url_arm64 }}
            CLI_SHA512_ARM64=${{ steps.agy-metadata.outputs.sha512_arm64 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

