name: Docker CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: '15 20 * * *'

jobs:
  check-new-release:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      version: ${{ steps.agy-metadata.outputs.version }}
      url_amd64: ${{ steps.agy-metadata.outputs.url_amd64 }}
      sha512_amd64: ${{ steps.agy-metadata.outputs.sha512_amd64 }}
      url_arm64: ${{ steps.agy-metadata.outputs.url_arm64 }}
      sha512_arm64: ${{ steps.agy-metadata.outputs.sha512_arm64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract Antigravity CLI version and metadata
        id: agy-metadata
        run: ./scripts/get-metadata.sh

      - name: Check if tag exists
        id: check
        shell: bash
        run: |
          VERSION="${{ steps.agy-metadata.outputs.version }}"
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
              echo "Tag v$VERSION already exists. Skipping scheduled run."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            else
              echo "New version $VERSION detected. Proceeding with scheduled run."
              echo "should_run=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Not a scheduled run. Proceeding."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: check-new-release
    if: needs.check-new-release.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=${{ needs.check-new-release.outputs.version }},enable=${{ github.ref == 'refs/heads/master' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./docker
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CLI_VERSION=${{ needs.check-new-release.outputs.version }}
            CLI_URL_AMD64=${{ needs.check-new-release.outputs.url_amd64 }}
            CLI_SHA512_AMD64=${{ needs.check-new-release.outputs.sha512_amd64 }}
            CLI_URL_ARM64=${{ needs.check-new-release.outputs.url_arm64 }}
            CLI_SHA512_ARM64=${{ needs.check-new-release.outputs.sha512_arm64 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Git Tag
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        run: |
          VERSION="${{ needs.check-new-release.outputs.version }}"
          if ! git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Creating tag v$VERSION"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "v$VERSION"
            git push origin "v$VERSION"
          else
            echo "Tag v$VERSION already exists"
          fi
